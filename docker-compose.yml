name: mockline

services:
  redis:
    image: redis:7-alpine
    container_name: mockline-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: mockline-chromadb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
      CHROMA_SERVER_AUTHN_CREDENTIALS: ""
      CHROMA_SERVER_AUTHN_PROVIDER: ""
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8000/api/v2/heartbeat || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  opensandbox:
    build:
      context: .
      dockerfile: Dockerfile.opensandbox
    image: mockline-opensandbox:latest
    container_name: mockline-opensandbox
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./sandbox.toml:/etc/sandbox/sandbox.toml:ro
    environment:
      DOCKER_HOST: "unix:///var/run/docker.sock"
    group_add:
      - "0"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
    driver: local
  chroma-data:
    driver: local
