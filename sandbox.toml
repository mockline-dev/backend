[server]
host = "0.0.0.0"
port = 8080
log_level = "INFO"
# Set a non-empty string to require OPEN-SANDBOX-API-KEY header.
# Leave empty for local dev (no auth required).
api_key = ""

[runtime]
type = "docker"
# execd is the lightweight agent injected into every sandbox container.
# Pre-pulled by `./scripts/infra.sh start` before docker compose up.
execd_image = "opensandbox/execd:latest"

[docker]
# "bridge" is correct when the OpenSandbox server itself runs in Docker.
# The SDK's useServerProxy=true handles container↔server communication,
# so sandbox containers don't need direct access to the server's hostname.
# Switch to "host" only if running the server directly on bare metal.
network_mode = "bridge"
api_timeout = 30
no_new_privileges = true
pids_limit = 512

[ingress]
mode = "direct"
