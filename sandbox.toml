[server]
host = "0.0.0.0"
port = 8080
log_level = "INFO"
# Set a non-empty string to require OPEN-SANDBOX-API-KEY header.
# Leave empty for local dev (no auth required).
api_key = ""

[runtime]
type = "docker"
# execd is the lightweight agent injected into every sandbox container.
# Pre-pulled by `./scripts/infra.sh start` before docker compose up.
execd_image = "opensandbox/execd:latest"

[docker]
# "host" shares the host network stack with sandbox containers so they can
# reach services on 127.0.0.1 (Redis, ChromaDB, the backend itself).
# Switch to "bridge" for stricter isolation in production.
network_mode = "host"
api_timeout = 30
no_new_privileges = true
pids_limit = 512

[ingress]
mode = "direct"
